<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Zero Ads</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --accent: #ff3b30; --text: #fff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .app { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; }
        .header { padding: 20px; background: #121212; border-bottom: 1px solid #333; }
        .status-pill { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #333; margin-bottom: 15px; }
        #now-playing { color: var(--accent); font-weight: 600; display: block; margin-top: 5px; font-size: 0.85em; }
        .inputs { display: flex; flex-direction: column; gap: 10px; }
        input, select { background: #2c2c2e; border: none; color: white; padding: 14px; border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .folders-row { display: flex; overflow-x: auto; padding: 10px 15px; gap: 8px; }
        .chip { background: #2c2c2e; padding: 8px 16px; border-radius: 20px; white-space: nowrap; font-size: 13px; border: 1px solid #333; }
        .chip.active { background: var(--accent); border-color: var(--accent); }
        .track-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; padding-bottom: 100px; }
        .track-card { background: var(--card); padding: 16px; border-radius: 14px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #2c2c2e; }
        #player-wrapper { position: fixed; bottom: 0; left: 0; width: 100%; height: 80px; background: #000; border-top: 1px solid #333; z-index: 100; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="status-pill">
            <span style="font-size: 0.7em; color: #8e8e93;">PROXY ANTI-PUB ACTIVÉ</span>
            <span id="now-playing">Prêt à jouer</span>
        </div>
        <div class="inputs">
            <input type="text" id="ytLink" placeholder="Lien YouTube ou Playlist...">
            <div style="display: flex; gap: 8px;">
                <select id="folderSelect" style="flex: 1;"></select>
                <button class="btn-add" onclick="addTrack()">AJOUTER</button>
            </div>
        </div>
    </div>
    <div class="folders-row" id="folder-list"></div>
    <div id="track-list" class="track-list"></div>
</div>

<div id="player-wrapper">
    <iframe id="mainPlayer" src="" allow="autoplay; fullscreen"></iframe>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('audioAppVFinal')) || { folders: ["Ma Musique"], tracks: [] };
    let currentFolder = data.folders[0];

    function save() { localStorage.setItem('audioAppVFinal', JSON.stringify(data)); render(); }

    function addTrack() {
        const url = document.getElementById('ytLink').value.trim();
        let vId = "";
        if (url.includes("v=")) vId = url.split("v=")[1].split("&")[0];
        else if (url.includes("youtu.be/")) vId = url.split("youtu.be/")[1].split("?")[0];

        if (vId) {
            data.tracks.push({ 
                id: Date.now(), 
                vId: vId, 
                folder: document.getElementById('folderSelect').value, 
                title: "Son " + (data.tracks.length + 1) 
            });
            document.getElementById('ytLink').value = '';
            save();
        }
    }

    function play(vId, title) {
        const player = document.getElementById('mainPlayer');
        // Instance Piped (Proxy) : Aucune pub, permet l'arrière-plan sur Brave
        player.src = `https://pipedapi.kavin.rocks/embed/${vId}`;
        
        document.getElementById('now-playing').innerText = title;

        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({ title: title, artist: 'Ad-Free App' });
        }
    }

    function render() {
        const fList = document.getElementById('folder-list');
        fList.innerHTML = '';
        data.folders.forEach(f => {
            const chip = document.createElement('div');
            chip.className = `chip ${currentFolder === f ? 'active' : ''}`;
            chip.innerText = f;
            chip.onclick = () => { currentFolder = f; render(); };
            fList.appendChild(chip);
        });
        document.getElementById('folderSelect').innerHTML = data.folders.map(f => `<option value="${f}">${f}</option>`).join('');
        const tList = document.getElementById('track-list');
        tList.innerHTML = '';
        data.tracks.filter(t => t.folder === currentFolder).forEach(t => {
            tList.innerHTML += `<div class="track-card" onclick="play('${t.vId}', '${t.title}')">🎵 ${t.title}</div>`;
        });
    }

    render();
</script>
</body>
</html>

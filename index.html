<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Audio Library</title>
    <style>
        :root { --bg: #0f0f0f; --panel: #1a1a1a; --accent: #ff4500; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--panel); border-right: 1px solid #333; padding: 20px; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.5); }
        h3 { color: var(--accent); text-transform: uppercase; font-size: 0.9em; letter-spacing: 1px; }
        .folder-list { flex: 1; overflow-y: auto; margin: 15px 0; }
        .folder { padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 8px; transition: 0.2s; background: #252525; border: 1px solid transparent; }
        .folder:hover { background: #333; }
        .folder.active { background: var(--accent); color: white; border-color: #ff6347; font-weight: bold; }

        /* Main Content */
        .main { flex: 1; padding: 30px; display: flex; flex-direction: column; position: relative; }
        .player-status { background: linear-gradient(90deg, #222, #111); padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 25px; border: 1px solid #333; }
        #now-playing { font-size: 1.1em; font-weight: bold; color: var(--accent); }

        /* Lecteur masqué */
        #player-wrapper { width: 1px; height: 1px; opacity: 0; position: absolute; top: 0; left: 0; pointer-events: none; }

        .input-box { display: flex; gap: 10px; margin-bottom: 25px; background: #222; padding: 15px; border-radius: 10px; }
        input, select { background: #111; border: 1px solid #444; color: white; padding: 12px; border-radius: 6px; outline: none; }
        input:focus { border-color: var(--accent); }
        button { background: var(--accent); border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        button:hover { background: #ff6347; transform: translateY(-2px); }

        .track-list { flex: 1; overflow-y: auto; display: grid; gap: 10px; align-content: start; }
        .track-item { background: #1e1e1e; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #282828; transition: 0.2s; }
        .track-item:hover { border-color: #444; background: #252525; }
        .track-info { cursor: pointer; flex: 1; display: flex; align-items: center; gap: 10px; }
        .delete-btn { background: transparent; color: #555; border: none; cursor: pointer; font-size: 1.2em; padding: 5px; }
        .delete-btn:hover { color: #ff0000; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>📁 Répertoires</h3>
    <div id="folder-list" class="folder-list"></div>
    <input type="text" id="newFolderName" placeholder="Nom du répertoire...">
    <button onclick="addFolder()" style="margin-top:10px; width:100%;">+ Créer Dossier</button>
</div>

<div class="main">
    <div class="player-status">
        <span>Statut : </span><span id="now-playing">En attente...</span>
    </div>

    <div id="player-wrapper">
        <iframe id="mainPlayer" src="" allow="autoplay"></iframe>
    </div>

    <div class="input-box">
        <input type="text" id="ytLink" placeholder="Coller lien YouTube ou Playlist..." style="flex:3;">
        <select id="folderSelect" style="flex:1;"></select>
        <button onclick="addTrack()">Ajouter à la liste</button>
    </div>

    <div id="track-list" class="track-list"></div>
</div>

<script>
    // Initialisation des données
    let data = JSON.parse(localStorage.getItem('audioAppV3')) || { 
        folders: ["Ma Musique"], 
        tracks: [] 
    };
    let currentFolder = data.folders[0];

    function save() { 
        localStorage.setItem('audioAppV3', JSON.stringify(data)); 
        render(); 
    }

    function addFolder() {
        const name = document.getElementById('newFolderName').value.trim();
        if(name && !data.folders.includes(name)) {
            data.folders.push(name);
            document.getElementById('newFolderName').value = '';
            save();
        }
    }

    function addTrack() {
        const url = document.getElementById('ytLink').value.trim();
        const folder = document.getElementById('folderSelect').value;
        let vId = "";

        // Extraction de l'ID vidéo (marche pour liens simples et dans les playlists)
        if(url.includes("v=")) {
            vId = url.split("v=")[1].split("&")[0];
        } else if(url.includes("youtu.be/")) {
            vId = url.split("youtu.be/")[1].split("?")[0];
        }

        if(vId) {
            data.tracks.push({ 
                id: Date.now(), 
                vId: vId, 
                folder: folder, 
                title: "Titre " + new Date().toLocaleTimeString() 
            });
            document.getElementById('ytLink').value = '';
            save();
        } else {
            alert("Lien invalide. Assurez-vous qu'il s'agit d'un lien YouTube.");
        }
    }

    function play(vId, title) {
        // Redirection sans pub via yout-ube.com
        const player = document.getElementById('mainPlayer');
        player.src = `https://www.yout-ube.com/embed/${vId}?autoplay=1`;
        document.getElementById('now-playing').innerText = "Lecture : " + title;
        
        // Tentative de maintien de l'audio (WakeLock)
        if ('wakeLock' in navigator) {
            navigator.wakeLock.request('screen').catch(() => {});
        }
    }

    function deleteTrack(id) {
        data.tracks = data.tracks.filter(t => t.id !== id);
        save();
    }

    function render() {
        // Rendre la liste des dossiers
        const fList = document.getElementById('folder-list');
        fList.innerHTML = '';
        data.folders.forEach(f => {
            const div = document.createElement('div');
            div.className = `folder ${currentFolder === f ? 'active' : ''}`;
            div.innerText = f;
            div.onclick = () => { currentFolder = f; render(); };
            fList.appendChild(div);
        });

        // Rendre le sélecteur de dossier
        const fSelect = document.getElementById('folderSelect');
        fSelect.innerHTML = data.folders.map(f => `<option value="${f}">${f}</option>`).join('');

        // Rendre les pistes du dossier actuel
        const tList = document.getElementById('track-list');
        tList.innerHTML = '';
        const tracks = data.tracks.filter(t => t.folder === currentFolder);

        if(tracks.length === 0) {
            tList.innerHTML = '<p style="color:#666; text-align:center;">Dossier vide. Ajoutez un lien YouTube pour commencer.</p>';
        }

        tracks.forEach(t => {
            tList.innerHTML += `
                <div class="track-item">
                    <div class="track-info" onclick="play('${t.vId}', '${t.title}')">
                        <span>▶</span> <span>${t.title}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteTrack(${t.id})">🗑</button>
                </div>
            `;
        });
    }

    // Lancer le rendu initial
    render();
</script>

</body>
</html>

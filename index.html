<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Pocket</title>
    <style>
        :root { --bg: #000000; --card: #1c1c1e; --accent: #0a84ff; --text: #ffffff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        .app-container { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; }

        /* Header & Lecteur */
        .header { padding: 20px; background: #121212; border-bottom: 1px solid #333; sticky: top; }
        .status-pill { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #333; margin-bottom: 15px; }
        #now-playing { color: var(--accent); font-weight: 600; display: block; margin-top: 5px; font-size: 0.9em; }

        /* Formulaire d'ajout */
        .input-section { padding: 15px; background: #121212; display: flex; flex-direction: column; gap: 10px; }
        input, select { background: #2c2c2e; border: none; color: white; padding: 12px; border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* Gestion des dossiers */
        .folder-bar { display: flex; overflow-x: auto; padding: 10px 15px; gap: 10px; background: #000; scrollbar-width: none; }
        .folder-bar::-webkit-scrollbar { display: none; }
        .folder-chip { background: #2c2c2e; padding: 8px 16px; border-radius: 20px; white-space: nowrap; font-size: 14px; border: 1px solid #333; }
        .folder-chip.active { background: var(--accent); border-color: var(--accent); }

        /* Liste des morceaux */
        .track-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .track-card { background: var(--card); padding: 16px; border-radius: 14px; display: flex; align-items: center; justify-content: space-between; }
        .track-info { flex: 1; font-weight: 500; font-size: 15px; }
        .btn-del { background: transparent; border: none; color: #ff453a; font-size: 18px; padding-left: 15px; }

        /* Lecteur invisible */
        #player-wrapper { width: 1px; height: 1px; opacity: 0; position: absolute; pointer-events: none; }
        
        .add-folder-row { display: flex; gap: 5px; padding: 0 15px 15px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="status-pill">
            <span style="font-size: 0.8em; color: #8e8e93;">LECTURE EN COURS</span>
            <span id="now-playing">Aucun morceau</span>
        </div>
        
        <div class="input-section">
            <input type="text" id="ytLink" placeholder="Coller un lien YouTube...">
            <div style="display: flex; gap: 8px;">
                <select id="folderSelect" style="flex: 1;"></select>
                <button class="btn-add" onclick="addTrack()" style="flex: 1;">Ajouter</button>
            </div>
        </div>
    </div>

    <div class="folder-bar" id="folder-list"></div>
    
    <div class="add-folder-row">
        <input type="text" id="newFolderName" placeholder="Nouveau dossier..." style="font-size: 14px;">
        <button onclick="addFolder()" style="background:#333; color:white; border:none; border-radius:10px; padding:0 15px;">+</button>
    </div>

    <div id="track-list" class="track-list"></div>
</div>

<div id="player-wrapper">
    <iframe id="mainPlayer" src="" allow="autoplay"></iframe>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('audioAppMobile')) || { 
        folders: ["Général"], 
        tracks: [] 
    };
    let currentFolder = data.folders[0];

    function save() { 
        localStorage.setItem('audioAppMobile', JSON.stringify(data)); 
        render(); 
    }

    function addFolder() {
        const name = document.getElementById('newFolderName').value.trim();
        if(name && !data.folders.includes(name)) {
            data.folders.push(name);
            document.getElementById('newFolderName').value = '';
            save();
        }
    }

    function addTrack() {
        const url = document.getElementById('ytLink').value.trim();
        const folder = document.getElementById('folderSelect').value;
        let vId = "";

        if(url.includes("v=")) vId = url.split("v=")[1].split("&")[0];
        else if(url.includes("youtu.be/")) vId = url.split("youtu.be/")[1].split("?")[0];

        if(vId) {
            data.tracks.push({ 
                id: Date.now(), 
                vId: vId, 
                folder: folder, 
                title: "Son " + (data.tracks.filter(t=>t.folder===folder).length + 1)
            });
            document.getElementById('ytLink').value = '';
            save();
        } else { alert("Lien non reconnu"); }
    }

    function play(vId, title) {
        document.getElementById('mainPlayer').src = `https://www.yout-ube.com/embed/${vId}?autoplay=1`;
        document.getElementById('now-playing').innerText = title;
        if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(()=>{});
    }

    function deleteTrack(id) {
        data.tracks = data.tracks.filter(t => t.id !== id);
        save();
    }

    function render() {
        const fList = document.getElementById('folder-list');
        fList.innerHTML = '';
        data.folders.forEach(f => {
            const chip = document.createElement('div');
            chip.className = `folder-chip ${currentFolder === f ? 'active' : ''}`;
            chip.innerText = f;
            chip.onclick = () => { currentFolder = f; render(); };
            fList.appendChild(chip);
        });

        const fSelect = document.getElementById('folderSelect');
        fSelect.innerHTML = data.folders.map(f => `<option value="${f}">${f}</option>`).join('');

        const tList = document.getElementById('track-list');
        tList.innerHTML = '';
        const tracks = data.tracks.filter(t => t.folder === currentFolder);

        tracks.forEach(t => {
            tList.innerHTML += `
                <div class="track-card">
                    <div class="track-info" onclick="play('${t.vId}', '${t.title}')">🎵 ${t.title}</div>
                    <button class="btn-del" onclick="deleteTrack(${t.id})">✕</button>
                </div>
            `;
        });
    }

    render();
</script>

</body>
</html>

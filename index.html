<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Ad-Free Player</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --text: #ffffff;
            --accent: #ff0000;
            --card: #282828;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: var(--accent); text-align: center; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #1a1a1a; color: white; outline: none; }
        input:focus { border-color: var(--accent); }
        button { padding: 10px 20px; background: var(--accent); border: none; color: white; cursor: pointer; border-radius: 5px; font-weight: bold; }
        button:hover { background: #cc0000; }

        .video-list { display: grid; gap: 15px; }
        .video-item { background: var(--card); padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; animation: fadeIn 0.3s ease; }
        .video-link { color: #3ea6ff; text-decoration: none; word-break: break-all; margin-right: 10px; font-size: 0.9em; }
        .video-link:hover { text-decoration: underline; }
        .delete-btn { background: #444; font-size: 12px; color: white; padding: 5px 10px; border: none; border-radius: 3px; cursor: pointer; }
        .delete-btn:hover { background: #666; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>Tube Ad-Free Linker</h1>
    
    <div class="input-group">
        <input type="text" id="ytLink" placeholder="Collez un lien YouTube ou youtu.be...">
        <button onclick="addVideo()">Ajouter</button>
    </div>

    <div id="videoList" class="video-list"></div>
</div>

<script>
    // Charger la liste sauvegardée
    let playlist = JSON.parse(localStorage.getItem('myPlaylist')) || [];
    renderPlaylist();

    function addVideo() {
        const input = document.getElementById('ytLink');
        let url = input.value.trim();
        
        if (!url) return;

        let modifiedUrl = "";

        // Cas 1 : Lien standard (youtube.com)
        if (url.includes("youtube.com")) {
            modifiedUrl = url.replace("youtube.com", "yout-ube.com");
        } 
        // Cas 2 : Lien court (youtu.be)
        else if (url.includes("youtu.be/")) {
            let id = url.split("youtu.be/")[1].split(/[?#]/)[0];
            modifiedUrl = `https://www.yout-ube.com/watch?v=${id}`;
        }

        if (modifiedUrl) {
            playlist.push({ id: Date.now(), modified: modifiedUrl });
            localStorage.setItem('myPlaylist', JSON.stringify(playlist));
            input.value = '';
            renderPlaylist();
        } else {
            alert("Lien non reconnu. Utilisez un lien YouTube valide.");
        }
    }

    function deleteVideo(id) {
        playlist = playlist.filter(v => v.id !== id);
        localStorage.setItem('myPlaylist', JSON.stringify(playlist));
        renderPlaylist();
    }

    function renderPlaylist() {
        const listContainer = document.getElementById('videoList');
        listContainer.innerHTML = '';

        if (playlist.length === 0) {
            listContainer.innerHTML = '<p style="text-align:center; color:#888;">Aucune vidéo en mémoire.</p>';
        }

        playlist.forEach(video => {
            listContainer.innerHTML += `
                <div class="video-item">
                    <a href="${video.modified}" target="_blank" class="video-link">${video.modified}</a>
                    <button class="delete-btn" onclick="deleteVideo(${video.id})">Supprimer</button>
                </div>
            `;
        });
    }
</script>

</body>
</html>

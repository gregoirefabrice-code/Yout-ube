<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Pocket Pro</title>
    <style>
        :root { --bg: #000000; --card: #1c1c1e; --accent: #ff3b30; --text: #ffffff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .app { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; }
        
        .header { padding: 20px; background: #121212; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 10; }
        .status-pill { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #333; margin-bottom: 15px; }
        #now-playing { color: var(--accent); font-weight: 600; display: block; margin-top: 5px; font-size: 0.85em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .inputs { display: flex; flex-direction: column; gap: 10px; }
        input, select { background: #2c2c2e; border: none; color: white; padding: 14px; border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .folders-row { display: flex; overflow-x: auto; padding: 10px 15px; gap: 8px; background: #000; }
        .chip { background: #2c2c2e; padding: 8px 16px; border-radius: 20px; white-space: nowrap; font-size: 13px; border: 1px solid #333; }
        .chip.active { background: var(--accent); border-color: var(--accent); font-weight: bold; }

        .track-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; padding-bottom: 100px; }
        .track-card { background: var(--card); padding: 16px; border-radius: 14px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #2c2c2e; }
        .track-info { flex: 1; cursor: pointer; font-size: 15px; overflow: hidden; text-overflow: ellipsis; }
        .btn-del { color: #444; background: none; border: none; font-size: 18px; padding-left: 10px; }

        #player-wrapper { position: fixed; bottom: -200px; left: 0; width: 100%; height: 60px; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="status-pill">
            <span style="font-size: 0.7em; color: #8e8e93; letter-spacing: 1px;">LECTEUR OPTIMISÉ</span>
            <span id="now-playing">Sélectionnez un son</span>
        </div>
        <div class="inputs">
            <input type="text" id="ytLink" placeholder="Collez votre lien YouTube ici...">
            <div style="display: flex; gap: 8px;">
                <select id="folderSelect" style="flex: 1;"></select>
                <button class="btn-add" onclick="addTrack()" style="flex: 1;">AJOUTER</button>
            </div>
        </div>
    </div>

    <div class="folders-row" id="folder-list"></div>

    <div style="padding: 0 15px 10px; display: flex; gap: 8px;">
        <input type="text" id="newFolder" placeholder="Nouveau répertoire..." style="font-size: 13px; padding: 10px;">
        <button onclick="addFolder()" style="background:#333; color:white; border:none; border-radius:10px; padding:0 15px;">+</button>
    </div>

    <div id="track-list" class="track-list"></div>
</div>

<div id="player-wrapper">
    <iframe id="mainPlayer" src="" allow="autoplay; encrypted-media"></iframe>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('audioAppFinalV5')) || { folders: ["Général"], tracks: [] };
    let currentFolder = data.folders[0];

    function save() { localStorage.setItem('audioAppFinalV5', JSON.stringify(data)); render(); }

    function addFolder() {
        const name = document.getElementById('newFolder').value.trim();
        if(name && !data.folders.includes(name)) {
            data.folders.push(name);
            document.getElementById('newFolder').value = '';
            save();
        }
    }

    function addTrack() {
        const input = document.getElementById('ytLink');
        const url = input.value.trim();
        const folder = document.getElementById('folderSelect').value;

        // Extraction précise de l'ID vidéo et de l'ID playlist
        let vId = "";
        let listId = "";

        if (url.includes("v=")) vId = url.split("v=")[1].split("&")[0];
        else if (url.includes("youtu.be/")) vId = url.split("youtu.be/")[1].split("?")[0];

        if (url.includes("list=")) listId = url.split("list=")[1].split("&")[0];

        if (vId) {
            // On construit l'URL exacte que tu as demandée
            let finalUrl = `https://www.youtube-nocookie.com/embed/${vId}?autoplay=1&iv_load_policy=3&loop=1&start=`;
            if (listId) finalUrl += `&list=${listId}`;

            data.tracks.push({
                id: Date.now(),
                embedUrl: finalUrl,
                folder: folder,
                title: "Son " + (data.tracks.length + 1)
            });
            input.value = '';
            save();
        } else { alert("Lien non reconnu"); }
    }

    function play(url, title) {
        const player = document.getElementById('mainPlayer');
        player.src = url;
        document.getElementById('now-playing').innerText = title;
        if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(()=>{});
    }

    function deleteTrack(id) {
        data.tracks = data.tracks.filter(t => t.id !== id);
        save();
    }

    function render() {
        const fList = document.getElementById('folder-list');
        fList.innerHTML = '';
        data.folders.forEach(f => {
            const chip = document.createElement('div');
            chip.className = `chip ${currentFolder === f ? 'active' : ''}`;
            chip.innerText = f;
            chip.onclick = () => { currentFolder = f; render(); };
            fList.appendChild(chip);
        });

        document.getElementById('folderSelect').innerHTML = data.folders.map(f => `<option value="${f}">${f}</option>`).join('');

        const tList = document.getElementById('track-list');
        tList.innerHTML = '';
        data.tracks.filter(t => t.folder === currentFolder).forEach(t => {
            const card = document.createElement('div');
            card.className = 'track-card';
            card.innerHTML = `
                <div class="track-info" onclick="play('${t.embedUrl}', '${t.title}')">🎵 ${t.title}</div>
                <button class="btn-del" onclick="deleteTrack(${t.id})">✕</button>
            `;
            tList.appendChild(card);
        });
    }

    render();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Pocket</title>
    <style>
        :root { --bg: #000000; --card: #1c1c1e; --accent: #ff3b30; --text: #ffffff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }
        
        .app-container { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; }

        .header { padding: 20px; background: #121212; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 10; }
        .status-pill { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #333; margin-bottom: 15px; }
        #now-playing { color: var(--accent); font-weight: 600; display: block; margin-top: 5px; font-size: 0.9em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .input-section { padding: 10px 0; display: flex; flex-direction: column; gap: 10px; }
        input, select { background: #2c2c2e; border: none; color: white; padding: 14px; border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }

        .folder-bar { display: flex; overflow-x: auto; padding: 10px 15px; gap: 10px; background: #000; -webkit-overflow-scrolling: touch; }
        .folder-chip { background: #2c2c2e; padding: 8px 16px; border-radius: 20px; white-space: nowrap; font-size: 14px; border: 1px solid #333; transition: 0.2s; }
        .folder-chip.active { background: var(--accent); border-color: var(--accent); }

        .track-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 100px; }
        .track-card { background: var(--card); padding: 18px; border-radius: 16px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #2c2c2e; }
        .track-info { flex: 1; font-weight: 500; font-size: 16px; display: flex; align-items: center; gap: 10px; }
        .btn-del { background: transparent; border: none; color: #555; font-size: 20px; padding-left: 15px; }

        /* Lecteur presque invisible mais fonctionnel */
        #player-wrapper { 
            position: fixed; 
            bottom: -100px; /* Caché hors écran */
            left: 0; 
            width: 100%; 
            height: 60px; 
            background: #111;
            z-index: 5;
        }
        #mainPlayer { width: 100%; height: 100%; border: none; }
        
        .add-folder-row { display: flex; gap: 8px; padding: 10px 15px; background: #000; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="status-pill">
            <span style="font-size: 0.7em; color: #8e8e93; letter-spacing: 1px;">PLAYER</span>
            <span id="now-playing">Sélectionnez un titre</span>
        </div>
        
        <div class="input-section">
            <input type="text" id="ytLink" placeholder="Coller lien YouTube...">
            <div style="display: flex; gap: 8px;">
                <select id="folderSelect" style="flex: 1.5;"></select>
                <button class="btn-add" onclick="addTrack()" style="flex: 1;">AJOUTER</button>
            </div>
        </div>
    </div>

    <div class="folder-bar" id="folder-list"></div>
    
    <div class="add-folder-row">
        <input type="text" id="newFolderName" placeholder="Nouveau dossier..." style="font-size: 14px; padding: 8px;">
        <button onclick="addFolder()" style="background:#333; color:white; border:none; border-radius:8px; padding:0 15px;">+</button>
    </div>

    <div id="track-list" class="track-list"></div>
</div>

<div id="player-wrapper">
    <iframe id="mainPlayer" src="" allow="autoplay; encrypted-media"></iframe>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('audioAppFinal')) || { 
        folders: ["Ma Liste"], 
        tracks: [] 
    };
    let currentFolder = data.folders[0];

    function save() { 
        localStorage.setItem('audioAppFinal', JSON.stringify(data)); 
        render(); 
    }

    function addFolder() {
        const name = document.getElementById('newFolderName').value.trim();
        if(name && !data.folders.includes(name)) {
            data.folders.push(name);
            document.getElementById('newFolderName').value = '';
            save();
        }
    }

    function addTrack() {
        const urlInput = document.getElementById('ytLink');
        const url = urlInput.value.trim();
        const folder = document.getElementById('folderSelect').value;
        let vId = "";

        try {
            if (url.includes("v=")) {
                vId = url.split("v=")[1].split("&")[0];
            } else if (url.includes("youtu.be/")) {
                vId = url.split("youtu.be/")[1].split("?")[0];
            } else if (url.includes("embed/")) {
                vId = url.split("embed/")[1].split("?")[0];
            }
        } catch(e) { console.error("Erreur d'extraction ID"); }

        if(vId && vId.length === 11) {
            data.tracks.push({ 
                id: Date.now(), 
                vId: vId, 
                folder: folder, 
                title: "Piste " + (data.tracks.length + 1)
            });
            urlInput.value = '';
            save();
        } else { 
            alert("Lien non reconnu. Copiez le lien depuis l'application YouTube."); 
        }
    }

    function play(vId, title) {
        // Utilisation de youtube-nocookie pour plus de stabilité
        const player = document.getElementById('mainPlayer');
        const playerWrapper = document.getElementById('player-wrapper');
        
        // On affiche légèrement le lecteur pour éviter que le navigateur ne bloque l'audio "invisible"
        playerWrapper.style.bottom = "0px";
        
        // Construction de l'URL embed optimisée
        player.src = `https://www.youtube-nocookie.com/embed/${vId}?autoplay=1&modestbranding=1&rel=0&iv_load_policy=3`;
        
        document.getElementById('now-playing').innerText = title;
        
        // Empêche la mise en veille sur mobile
        if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(()=>{});
    }

    function deleteTrack(id) {
        if(confirm("Supprimer ce titre ?")) {
            data.tracks = data.tracks.filter(t => t.id !== id);
            save();
        }
    }

    function render() {
        // Dossiers
        const fList = document.getElementById('folder-list');
        fList.innerHTML = '';
        data.folders.forEach(f => {
            const chip = document.createElement('div');
            chip.className = `folder-chip ${currentFolder === f ? 'active' : ''}`;
            chip.innerText = f;
            chip.onclick = () => { currentFolder = f; render(); };
            fList.appendChild(chip);
        });

        // Selecteur
        const fSelect = document.getElementById('folderSelect');
        fSelect.innerHTML = data.folders.map(f => `<option value="${f}">${f}</option>`).join('');

        // Liste
        const tList = document.getElementById('track-list');
        tList.innerHTML = '';
        const tracks = data.tracks.filter(t => t.folder === currentFolder);

        tracks.forEach(t => {
            const card = document.createElement('div');
            card.className = 'track-card';
            card.innerHTML = `
                <div class="track-info" onclick="play('${t.vId}', '${t.title}')">
                    <span style="color:var(--accent)">▶</span> ${t.title}
                </div>
                <button class="btn-del" onclick="deleteTrack(${t.id})">✕</button>
            `;
            tList.appendChild(card);
        });
    }

    render();
</script>

</body>
</html>
